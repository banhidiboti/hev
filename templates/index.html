<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KLÍMÁS HÉV TRACKER</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────── */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 18px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 1000;
    }
    .logo {
      width: 30px; height: 30px;
      background: #821066;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    header h1 { font-size: .95rem; font-weight: 600; letter-spacing: .01em; }

    #status-badge {
      font-size: .68rem; font-weight: 700; letter-spacing: .07em;
      padding: 3px 9px; border-radius: 999px; text-transform: uppercase;
      transition: background .3s, color .3s;
    }
    .badge-active  { background: #14532d; color: #4ade80; border: 1px solid #16a34a; }
    .badge-depot   { background: #451a03; color: #fb923c; border: 1px solid #c2410c; }
    .badge-loading { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }

    /* refresh in header */
    .refresh-wrap {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }
    .refresh-label {
      font-size: .72rem; color: #64748b; white-space: nowrap;
    }
    .refresh-bar-outer {
      width: 80px; height: 3px; background: #334155; border-radius: 2px; overflow: hidden;
    }
    .refresh-bar-inner {
      height: 100%; background: #821066; border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Map ──────────────────────────────────── */
    #map { flex: 1; background: #0f172a; }

    /* Leaflet overrides for dark theme */
    .leaflet-container { background: #0f172a !important; }
    .leaflet-popup-content-wrapper {
      background: #1e293b; color: #e2e8f0;
      border: 1px solid #334155; border-radius: 8px; box-shadow: none;
    }
    .leaflet-popup-tip { background: #1e293b; }
    .leaflet-popup-content { font-family: 'Segoe UI', system-ui, sans-serif; font-size: .82rem; line-height: 1.6; }
    .leaflet-control-zoom a {
      background: #1e293b !important; color: #e2e8f0 !important;
      border-color: #334155 !important;
    }
    .leaflet-control-zoom a:hover { background: #334155 !important; }
    .leaflet-control-attribution {
      background: rgba(15,23,42,.75) !important; color: #475569 !important;
    }
    .leaflet-control-attribution a { color: #64748b !important; }

    /* stop name labels */
    .stop-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      color: #e2e8f0;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .01em;
      text-shadow: 0 0 4px #0f172a, 0 0 8px #0f172a, 0 0 3px #0f172a;
      white-space: nowrap;
      pointer-events: none;
    }
    .stop-label::before { display: none !important; }

    /* train marker */
    .train-marker {
      width: 34px; height: 34px;
      background: #821066;
      border-radius: 50%;
      border: 3px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      box-shadow: 0 0 0 4px rgba(130,16,102,.4);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 4px rgba(130,16,102,.4); }
      50%      { box-shadow: 0 0 0 11px rgba(130,16,102,.0); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🚆</div>
  <h1>KLÍMÁS HÉV TRACKER</h1>
  <span id="status-badge" class="badge-loading">Loading…</span>
  <div class="refresh-wrap">
    <span class="refresh-label">Next update <span id="s-countdown">10</span>s</span>
    <div class="refresh-bar-outer">
      <div class="refresh-bar-inner" id="refresh-fill" style="width:0%"></div>
    </div>
  </div>
</header>

<div id="map"></div>

<script>
const REFRESH = 10;
const H5_BOUNDS = [[47.505, 19.018], [47.678, 19.095]];
const COMPASS = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
const STATUS_LABELS = {
  IN_TRANSIT_TO: "In transit to",
  STOPPED_AT:    "Stopped at",
  INCOMING_AT:   "Incoming at",
};

// ── Map ───────────────────────────────────────────
const map = L.map("map", { zoomControl: true }).fitBounds(H5_BOUNDS, { padding: [24, 24] });
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// pane that sits above the default overlayPane (z 400) so dots are always on top of the route line
map.createPane('stopsPane');
map.getPane('stopsPane').style.zIndex = 420;

// ── Polyline decoder ──────────────────────────────
function decodePolyline(encoded) {
  const coords = [];
  let lat = 0, lng = 0, i = 0;
  while (i < encoded.length) {
    let b, shift = 0, result = 0;
    do { b = encoded.charCodeAt(i++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : result >> 1;
    shift = 0; result = 0;
    do { b = encoded.charCodeAt(i++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : result >> 1;
    coords.push([lat / 1e5, lng / 1e5]);
  }
  return coords;
}

// ── Route shape ───────────────────────────────────
async function drawRouteShape() {
  try {
    const resp = await fetch("/api/route-shape");
    const data = await resp.json();
    if (!data.points) return;
    L.polyline(decodePolyline(data.points), {
      color: '#821066', weight: 5, opacity: 0.9,
      lineJoin: 'round', lineCap: 'round',
    }).addTo(map);
  } catch(e) { console.warn("route shape:", e); }
}

// ── Stops ─────────────────────────────────────────
async function drawStops() {
  try {
    const resp = await fetch("/api/stops");
    const data = await resp.json();
    (data.stops || []).forEach(stop => {
      L.circleMarker([stop.lat, stop.lon], {
        pane: 'stopsPane',
        radius: 5,
        fillColor: '#ffffff',
        fillOpacity: 1,
        color: '#821066',
        weight: 2.5,
      })
      .bindTooltip(stop.name, {
        permanent: true,
        direction: 'right',
        offset: [9, 0],
        className: 'stop-label',
      })
      .addTo(map);
    });
  } catch(e) { console.warn("stops:", e); }
}

// ── Train marker ──────────────────────────────────
function makeIcon() {
  return L.divIcon({
    className: "",
    html: `<div class="train-marker">🚆</div>`,
    iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -21],
  });
}

let marker = null, lastLat = null, lastLon = null;

function placeMarker(lat, lon, route, stopName, status) {
  const pos = [lat, lon];
  const label = STATUS_LABELS[status] || "at";
  if (!marker) {
    marker = L.marker(pos, { icon: makeIcon() }).addTo(map);
  } else {
    marker.setLatLng(pos);
  }
  marker.bindPopup(`<b>1311</b><br>${route}<br>${label} ${stopName}`);
  if (lat !== lastLat || lon !== lastLon) {
    map.flyTo(pos, Math.max(map.getZoom(), 14), { duration: 1.2 });
    lastLat = lat; lastLon = lon;
  }
}

function removeMarker() {
  if (marker) { map.removeLayer(marker); marker = null; }
  lastLat = lastLon = null;
  map.fitBounds(H5_BOUNDS, { padding: [24, 24], animate: true, duration: 0.8 });
}

// ── Refresh countdown ─────────────────────────────
let countdown = REFRESH;
let countdownInterval = null;
const fillEl  = document.getElementById("refresh-fill");
const countEl = document.getElementById("s-countdown");

function startCountdown() {
  countdown = REFRESH;
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    countdown = Math.max(0, countdown - 1);
    countEl.textContent = countdown;
    fillEl.style.width = ((REFRESH - countdown) / REFRESH * 100) + "%";
    if (countdown === 0) clearInterval(countdownInterval);
  }, 1000);
}

// ── Poll status ───────────────────────────────────
async function poll() {
  const badge = document.getElementById("status-badge");
  try {
    const resp = await fetch("/api/status");
    const data = await resp.json();

    if (data.found) {
      badge.textContent = `Active · ${data.route}`;
      badge.className = "badge-active";
      placeMarker(data.lat, data.lon, data.route, data.stopName, data.status);
    } else {
      badge.textContent = "Not in service";
      badge.className = "badge-depot";
      removeMarker();
    }
  } catch(e) {
    badge.textContent = "Error";
    badge.className = "badge-depot";
  }
  startCountdown();
  setTimeout(poll, REFRESH * 1000);
}

drawRouteShape();
drawStops();
poll();
</script>
</body>
</html>
